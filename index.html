<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsCord</title>
  <style>
    :root {
      --bg-dark: #2f3136;
      --bg-darker: #202225;
      --bg-light: #36393f;
      --bg-modal: #18191c;
      --text-main: #dcddde;
      --text-muted: #72767d;
      --blurple: #5865f2;
      --success: #3ba55d;
      --danger: #ed4245;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: var(--bg-darker); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; height: 100dvh; overflow: hidden; }
    
    .screen { width: 100%; max-width: 1100px; height: 95vh; height: 95dvh; background: var(--bg-light); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.3); position: relative; }
    .hidden { display: none !important; }

    /* Auth & Username Setup Screens */
    .centered-form { max-width: 400px; margin: auto; padding: 40px; background: var(--bg-dark); border-radius: 8px; text-align: center; width: 90%; }
    .centered-form h2 { margin-bottom: 20px; color: #fff; }
    .input-group { margin-bottom: 15px; text-align: left; }
    .input-group label { display: block; font-size: 12px; margin-bottom: 5px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
    input[type="text"], input[type="email"], input[type="password"], textarea, select { width: 100%; padding: 10px; background: var(--bg-darker); border: 1px solid transparent; color: #fff; border-radius: 4px; outline: none; resize: none; }
    input:focus, textarea:focus { border-color: var(--blurple); }
    button { width: 100%; padding: 12px; background: var(--blurple); border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.2s; margin-top: 10px; }
    button:hover { background: #4752c4; }
    
    /* Fixed Google Button styling with inline SVG support */
    .google-btn { background: #fff; color: #000; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .google-btn:hover { background: #e6e6e6; }
    .google-btn svg { width: 18px; height: 18px; }
    
    .toggle-link { color: var(--blurple); cursor: pointer; font-size: 14px; margin-top: 15px; display: inline-block; }

    /* Main Chat Layout */
    .chat-container { display: flex; height: 100%; width: 100%; position: relative; }
    
    /* Sidebar Layout */
    .sidebar { width: 280px; background: var(--bg-dark); display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid rgba(0,0,0,0.2); flex-shrink: 0; z-index: 5; }
    .sidebar-top { display: flex; flex-direction: column; height: calc(100% - 70px); }
    .sidebar-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.2); font-weight: bold; font-size: 18px; color: white; }
    
    /* Friend Request Section Layout Fixes */
    .friend-search-box { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.1); }
    .friend-search-box .flex { display: flex; gap: 6px; }
    .friend-search-box input { padding: 8px; font-size: 13px; }
    .friend-search-box button { width: auto; padding: 6px 12px; margin-top: 0; font-size: 13px; background: var(--success); white-space: nowrap; }
    .friend-search-box button:hover { background: #2e854b; }

    /* Channels & Friend Lists */
    .channels-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 4px; }
    .list-section-title { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; padding: 8px 5px 4px 5px; }
    .channel-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; cursor: pointer; color: var(--text-main); font-size: 15px; }
    .channel-item:hover, .channel-item.active { background: rgba(255,255,255,0.05); color: #fff; }
    .channel-item .avatar-sm { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; background: #40444b; }
    
    /* Identity Footer Section */
    .user-profile { padding: 12px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; border-top: 1px solid rgba(0,0,0,0.1); height: 70px; }
    .avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: var(--text-muted); cursor: pointer; transition: filter 0.2s; flex-shrink: 0; }
    .avatar:hover { filter: brightness(0.8); }
    .user-info { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
    .user-info .username { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; font-size: 14px; cursor: pointer; }
    .user-info .username:hover { text-decoration: underline; }
    .user-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .control-icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; font-size: 16px; width: auto; margin: 0; display: flex; align-items: center; }
    .control-icon-btn:hover { color: #fff; }

    /* Chat Windows Area */
    .main-chat { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-light); position: relative; width: 0; }
    .chat-header { height: 60px; padding: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; background: var(--bg-light); flex-shrink: 0; }
    .chat-header h3 { color: #fff; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .back-btn { display: none; background: transparent; color: var(--text-main); border: none; font-size: 18px; cursor: pointer; font-weight: bold; width: auto; margin: 0; padding: 5px; }
    
    .messages-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    
    /* Messaging Rows */
    .message { display: flex; gap: 15px; align-items: flex-start; }
    .message-content { display: flex; flex-direction: column; width: 100%; overflow: hidden; }
    .message-header { display: flex; align-items: baseline; gap: 8px; }
    .msg-username { font-weight: 600; color: #fff; font-size: 15px; cursor: pointer; }
    .msg-username:hover { text-decoration: underline; }
    .msg-time { font-size: 11px; color: var(--text-muted); }
    .msg-text { color: var(--text-main); font-size: 15px; word-break: break-word; line-height: 1.4; margin-top: 2px; }
    .embed-gif { max-width: 100%; max-height: 250px; border-radius: 4px; margin-top: 8px; display: block; object-fit: contain; }

    /* Input Bar */
    .input-area { padding: 20px; background: var(--bg-light); flex-shrink: 0; }
    .input-box-wrapper { background: #40444b; border-radius: 8px; padding: 12px 15px; display: flex; align-items: center; }
    .input-box-wrapper input { background: transparent; border: none; flex-grow: 1; color: #fff; font-size: 15px; outline: none; }

    /* Modals Infrastructure */
    .modal-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 100; }
    
    /* Settings Popout */
    .settings-card { width: 90%; max-width: 500px; background: var(--bg-dark); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
    .settings-header { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.2); font-weight: bold; font-size: 18px; color: #fff; }
    .settings-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 60vh; }
    .settings-footer { padding: 15px 20px; background: var(--bg-darker); display: flex; justify-content: flex-end; gap: 10px; }
    .settings-footer button { width: auto; margin: 0; padding: 8px 16px; }
    .cancel-btn { background: transparent; color: #fff; }
    .cancel-btn:hover { text-decoration: underline; background: transparent; }

    /* Profile Card View Overlay */
    .profile-popup-card { width: 300px; background: var(--bg-modal); border-radius: 12px; overflow: hidden; box-shadow: 0 12px 32px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
    .profile-banner { height: 100px; width: 100%; background-color: var(--blurple); position: relative; }
    .profile-avatar-wrapper { position: absolute; bottom: -30px; left: 16px; }
    .profile-avatar-wrapper .avatar-lg { width: 75px; height: 75px; border-radius: 50%; border: 6px solid var(--bg-modal); object-fit: cover; background: var(--text-muted); }
    .profile-info-content { padding: 45px 16px 16px 16px; background: var(--bg-modal); }
    .profile-info-content h4 { color: #fff; font-size: 20px; font-weight: bold; margin-bottom: 12px; }
    .profile-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }
    .profile-section-heading { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .profile-bio-text { font-size: 13px; color: var(--text-main); line-height: 1.4; word-break: break-word; }

    /* Mobile Adaptations */
    @media (max-width: 768px) {
      .sidebar { width: 100%; display: flex; }
      .main-chat { display: none; width: 100%; }
      .back-btn { display: block; }
      
      .show-chat-window .sidebar { display: none; }
      .show-chat-window .main-chat { display: flex; }
    }
  </style>
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen">
    <div class="centered-form">
      <h2 id="auth-title">Welcome to WhatsCord</h2>
      <form id="email-form">
        <div class="input-group">
          <label>Email Address</label>
          <input type="email" id="auth-email" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="auth-password" required>
        </div>
        <button type="submit" id="auth-submit-btn">Login</button>
      </form>
      <!-- Guaranteed Inline Google Vector Icon -->
      <button class="google-btn" id="google-btn">
        <svg viewBox="0 0 24 24">
          <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0112 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.33 0 3.357 2.673 1.414 6.564l3.852 3.201z"/>
          <path fill="#4285F4" d="M23.455 12.273c0-.818-.068-1.609-.205-2.364H12v4.483h6.436c-.277 1.477-1.114 2.727-2.368 3.568v2.964h3.823c2.236-2.064 3.564-5.105 3.564-8.651z"/>
          <path fill="#FBBC05" d="M5.266 14.235L1.414 17.436A11.947 11.947 0 010 12c0-1.959.473-3.814 1.309-5.464l3.957 3.11c-.245.728-.377 1.505-.377 2.354 0 .895.145 1.755.477 2.235z"/>
          <path fill="#34A853" d="M12 24c3.24 0 5.973-1.077 7.964-2.923l-3.823-2.964c-1.06.714-2.427 1.141-4.141 1.141-3.186 0-5.89-2.155-6.855-5.055L.291 17.305C2.205 21.236 6.273 24 12 24z"/>
        </svg>
        Sign in with Google
      </button>
      <span class="toggle-link" id="auth-toggle">Need an account? Register</span>
    </div>
  </div>

  <!-- INITIAL USERNAME SETUP -->
  <div id="username-screen" class="screen hidden">
    <div class="centered-form">
      <h2>Choose your Username</h2>
      <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Before entering WhatsCord, let others know who you are!</p>
      <form id="username-form">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="setup-username" placeholder="e.g., CyberKnight" required minlength="3">
        </div>
        <button type="submit">Finish Setup</button>
      </form>
    </div>
  </div>

  <!-- APPLICATION CORE WINDOW -->
  <div id="chat-screen" class="screen hidden">
    <div class="chat-container" id="chat-layout-wrapper">
      
      <!-- Left Hand Nav / Sidebar -->
      <div class="sidebar">
        <div class="sidebar-top">
          <div class="sidebar-header">WhatsCord</div>
          
          <!-- Add Friends Box -->
          <div class="friend-search-box">
            <div class="list-section-title" style="padding:0 0 5px 0;">Add Friend</div>
            <form id="friend-search-form" class="flex">
              <input type="text" id="friend-username-input" placeholder="Enter exact username..." required>
              <button type="submit">Add</button>
            </form>
          </div>

          <!-- Channel System lists -->
          <div class="channels-list">
            <div class="list-section-title">Public Feeds</div>
            <div class="channel-item active" id="chan-global" onclick="switchChannel('global', 'Global Chat Room')">
              <span style="color: var(--text-muted); font-weight: bold; font-size: 18px;">#</span>
              <span>global-chat</span>
            </div>

            <div class="list-section-title" style="margin-top: 15px;">Direct Messages</div>
            <div id="friends-list-render-target">
              <!-- Friends appear dynamically here -->
            </div>
          </div>
        </div>

        <!-- Self Identity Footer panel -->
        <div class="user-profile">
          <img id="user-avatar" class="avatar" src="" alt="Avatar" onclick="openSelfProfile()">
          <div class="user-info">
            <div id="user-display-name" class="username" onclick="openSelfProfile()">Loading...</div>
            <div style="font-size: 11px; color: var(--text-muted);">Online</div>
          </div>
          <div class="user-controls">
            <button class="control-icon-btn" title="Settings" onclick="toggleModal('settings-modal', true)">⚙️</button>
            <button id="logout-btn" class="control-icon-btn" title="Log Out" style="color: var(--danger)">🚪</button>
          </div>
        </div>
      </div>

      <!-- Main Messaging Board Panel -->
      <div class="main-chat">
        <div class="chat-header">
          <button class="back-btn" onclick="leaveChatMobile()">⬅</button>
          <h3 id="active-room-title">Global Chat Room</h3>
        </div>
        <div class="messages-container" id="messages-container">
          <!-- Text streams pop in here -->
        </div>
        <div class="input-area">
          <form id="chat-form" class="input-box-wrapper">
            <input type="text" id="chat-input" placeholder="Type a message or paste a .gif link..." autocomplete="off" required>
          </form>
        </div>
      </div>

    </div>
  </div>

  <!-- PROFILE CARD POPUP -->
  <div id="profile-popup-modal" class="modal-overlay hidden" onclick="toggleModal('profile-popup-modal', false)">
    <div class="profile-popup-card" onclick="event.stopPropagation()">
      <div class="profile-banner" id="popup-banner">
        <div class="profile-avatar-wrapper">
          <img class="avatar-lg" id="popup-avatar" src="" alt="Avatar">
        </div>
      </div>
      <div class="profile-info-content">
        <h4 id="popup-username">Username</h4>
        <div class="profile-divider"></div>
        <div class="profile-section-heading">About Me</div>
        <div class="profile-bio-text" id="popup-bio">No description provided.</div>
      </div>
    </div>
  </div>

  <!-- USER SETTINGS FORM PANEL MODAL -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="settings-card">
      <div class="settings-header">User Profile Settings</div>
      <form id="settings-form">
        <div class="settings-body">
          <div class="input-group">
            <label>Display Username</label>
            <input type="text" id="settings-username" required minlength="3">
          </div>
          <div class="input-group">
            <label>Profile Image URL</label>
            <input type="text" id="settings-avatar-url" placeholder="Paste image link Address">
          </div>
          <div class="input-group">
            <label>Profile Banner Color</label>
            <select id="settings-banner-color">
              <option value="#5865f2">Default Blurple</option>
              <option value="#3ba55d">Forest Green</option>
              <option value="#ed4245">Crimson Flare</option>
              <option value="#faa61a">Amber Gold</option>
              <option value="#eb14a4">Neon Magenta</option>
              <option value="#111111">Obsidian Night</option>
            </select>
          </div>
          <div class="input-group">
            <label>About Me (Description)</label>
            <textarea id="settings-bio" rows="3" maxlength="160" placeholder="Tell us about yourself..."></textarea>
          </div>
        </div>
        <div class="settings-footer">
          <button type="button" class="cancel-btn" onclick="toggleModal('settings-modal', false)">Cancel</button>
          <button type="submit" style="background: var(--success)">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- FIREBASE PLATFORM SCRIPT PACKAGES -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
      getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, 
      signInWithEmailAndPassword, signOut, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { 
      getFirestore, doc, setDoc, getDoc, updateDoc, collection, addDoc, query, orderBy, where, onSnapshot, serverTimestamp, arrayUnion, getDocs 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // App Firestore configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDeotdYyLjrcyN9PfGRp3zlt0x1iRoSQIU",
      authDomain: "whatscord-616d2.firebaseapp.com",
      projectId: "whatscord-616d2",
      storageBucket: "whatscord-616d2.firebasestorage.app",
      messagingSenderId: "453859845825",
      appId: "1:453859845825:web:af5250fbb1206607f5d640"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    let currentUserData = null;
    let isLoginMode = true;
    let currentChannelId = "global";
    let unsubscribeMessages = null;
    let unsubscribeFriends = null;

    const authScreen = document.getElementById('auth-screen');
    const usernameScreen = document.getElementById('username-screen');
    const chatScreen = document.getElementById('chat-screen');
    const chatLayoutWrapper = document.getElementById('chat-layout-wrapper');

    window.switchChannel = switchChannel;
    window.toggleModal = toggleModal;
    window.openSelfProfile = () => openUserProfileCard(currentUserData.uid);
    window.openUserProfileCard = openUserProfileCard;
    window.leaveChatMobile = () => chatLayoutWrapper.classList.remove('show-chat-window');

    function showScreen(screenId) {
      authScreen.classList.add('hidden');
      usernameScreen.classList.add('hidden');
      chatScreen.classList.add('hidden');
      document.getElementById(screenId).classList.remove('hidden');
    }

    function toggleModal(modalId, showStatus) {
      const targetModal = document.getElementById(modalId);
      if (showStatus) targetModal.classList.remove('hidden');
      else targetModal.classList.add('hidden');
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        onSnapshot(doc(db, "users", user.uid), (docSnapshot) => {
          if (docSnapshot.exists()) {
            currentUserData = docSnapshot.data();
            document.getElementById('user-display-name').innerText = currentUserData.username;
            document.getElementById('user-avatar').src = currentUserData.photoURL;
            
            document.getElementById('settings-username').value = currentUserData.username || "";
            document.getElementById('settings-avatar-url').value = currentUserData.photoURL || "";
            document.getElementById('settings-bio').value = currentUserData.bio || "";
            document.getElementById('settings-banner-color').value = currentUserData.bannerColor || "#5865f2";

            if (chatScreen.classList.contains('hidden')) {
              setupFriendsStream();
              switchChannel('global', 'Global Chat Room');
              showScreen('chat-screen');
            }
          } else {
            showScreen('username-screen');
          }
        });
      } else {
        if(unsubscribeFriends) unsubscribeFriends();
        if(unsubscribeMessages) unsubscribeMessages();
        showScreen('auth-screen');
      }
    });

    // --- ACCOUNT AUTHENTICATION FORMS ---
    document.getElementById('auth-toggle').addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      document.getElementById('auth-title').innerText = isLoginMode ? "Welcome to WhatsCord" : "Create an Account";
      document.getElementById('auth-submit-btn').innerText = isLoginMode ? "Login" : "Sign Up";
      document.getElementById('auth-toggle').innerText = isLoginMode ? "Need an account? Register" : "Already have an account? Login";
    });

    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      try {
        if (isLoginMode) await signInWithEmailAndPassword(auth, email, password);
        else await createUserWithEmailAndPassword(auth, email, password);
      } catch (err) { alert(err.message); }
    });

    document.getElementById('google-btn').addEventListener('click', async () => {
      try { await signInWithPopup(auth, googleProvider); } catch (err) { alert(err.message); }
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // --- USERNAME ONBOARDING ---
    document.getElementById('username-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      const usernameInput = document.getElementById('setup-username').value.trim();
      const generatedAvatar = user.photoURL || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(usernameInput)}`;

      const accountPayload = {
        uid: user.uid,
        username: usernameInput,
        photoURL: generatedAvatar,
        email: user.email,
        bio: "Hey there! I am using WhatsCord.",
        bannerColor: "#5865f2",
        friends: []
      };

      try {
        await setDoc(doc(db, "users", user.uid), accountPayload);
      } catch (err) { alert("Failed configuration upload: " + err.message); }
    });

    // --- CHANGE PROFILE SETTINGS ---
    document.getElementById('settings-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const updatedUsername = document.getElementById('settings-username').value.trim();
      const updatedAvatar = document.getElementById('settings-avatar-url').value.trim();
      const updatedBio = document.getElementById('settings-bio').value.trim();
      const updatedBanner = document.getElementById('settings-banner-color').value;

      try {
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
          username: updatedUsername,
          photoURL: updatedAvatar || `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(updatedUsername)}`,
          bio: updatedBio,
          bannerColor: updatedBanner
        });
        toggleModal('settings-modal', false);
      } catch(err) { alert("Error saving profile changes: " + err.message); }
    });

    // --- USER PROFILE DISPLAY LOOKUP ---
    async function openUserProfileCard(uid) {
      try {
        const userSnapshot = await getDoc(doc(db, "users", uid));
        if (userSnapshot.exists()) {
          const profileInfoData = userSnapshot.data();
          document.getElementById('popup-username').innerText = profileInfoData.username;
          document.getElementById('popup-avatar').src = profileInfoData.photoURL;
          document.getElementById('popup-bio').innerText = profileInfoData.bio || "No description provided.";
          document.getElementById('popup-banner').style.backgroundColor = profileInfoData.bannerColor || "#5865f2";
          toggleModal('profile-popup-modal', true);
        }
      } catch(err) { console.error("Could not trace profile details object reference:", err); }
    }

    // --- ADD FRIENDS LOGIC ENGINE ---
    document.getElementById('friend-search-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const targetInput = document.getElementById('friend-username-input');
      const targetName = targetInput.value.trim();

      if(targetName === currentUserData.username) {
        alert("You cannot add yourself as a friend.");
        return;
      }

      try {
        const userSearchQuery = query(collection(db, "users"), where("username", "==", targetName));
        const matchingSnapshots = await getDocs(userSearchQuery);

        if(matchingSnapshots.empty) {
          alert("User not found! Ensure spelling matches exactly.");
          return;
        }

        const foundUserDoc = matchingSnapshots.docs[0].data();
        
        await updateDoc(doc(db, "users", auth.currentUser.uid), {
          friends: arrayUnion(foundUserDoc.uid)
        });

        await updateDoc(doc(db, "users", foundUserDoc.uid), {
          friends: arrayUnion(auth.currentUser.uid)
        });

        targetInput.value = "";
        alert(`Successfully added ${foundUserDoc.username} to friends!`);
      } catch(err) { alert("Could not execute profile pairing sequence: " + err.message); }
    });

    // --- REALTIME FRIENDS SECTION PIPELINE ---
    function setupFriendsStream() {
      const profileDocRef = doc(db, "users", auth.currentUser.uid);
      
      unsubscribeFriends = onSnapshot(profileDocRef, async (profileSnap) => {
        const targetContainer = document.getElementById('friends-list-render-target');
        targetContainer.innerHTML = "";
        const friendsUIDList = profileSnap.data()?.friends || [];
        
        for(let friendUID of friendsUIDList) {
          const friendSnap = await getDoc(doc(db, "users", friendUID));
          if(friendSnap.exists()) {
            const fData = friendSnap.data();
            const dynamicDmChannelId = [auth.currentUser.uid, fData.uid].sort().join("___");
            
            const elementRow = document.createElement('div');
            elementRow.className = `channel-item ${currentChannelId === dynamicDmChannelId ? 'active' : ''}`;
            elementRow.id = `chan-${dynamicDmChannelId}`;
            elementRow.onclick = () => switchChannel(dynamicDmChannelId, fData.username);
            
            elementRow.innerHTML = `
              <img class="avatar-sm" src="${fData.photoURL}" alt="Avatar">
              <span class="friend-name" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${fData.username}</span>
            `;
            targetContainer.appendChild(elementRow);
          }
        }
      });
    }

    // --- SWITCH FEED CHANNELS MATRIX ---
    function switchChannel(channelId, layoutTitle) {
      document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
      const activeElement = document.getElementById(`chan-${channelId}`);
      if(activeElement) activeElement.classList.add('active');

      currentChannelId = channelId;
      document.getElementById('active-room-title').innerText = layoutTitle;
      chatLayoutWrapper.classList.add('show-chat-window');

      loadChatMessagesLogs();
    }

    // --- SEND CHAT MESSAGES BLOCK PACKAGES ---
    document.getElementById('chat-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const inputField = document.getElementById('chat-input');
      const inputPayloadText = inputField.value.trim();

      if (!inputPayloadText) return;

      try {
        await addDoc(collection(db, "messages"), {
          channelId: currentChannelId,
          uid: currentUserData.uid,
          username: currentUserData.username,
          photoURL: currentUserData.photoURL,
          text: inputPayloadText,
          createdAt: serverTimestamp()
        });
        inputField.value = "";
      } catch (err) { console.error("Payload streaming failure occurred:", err); }
    });

    // --- FIXED: CLIENT-SIDE RE-STREAMING CHAT ENGINE ---
    // This removes the index constraint so messages update across rooms seamlessly.
    function loadChatMessagesLogs() {
      if (unsubscribeMessages) unsubscribeMessages();

      const messagesQuery = query(collection(db, "messages"), orderBy("createdAt", "asc"));
      const logsViewBoard = document.getElementById('messages-container');

      unsubscribeMessages = onSnapshot(messagesQuery, (snapshot) => {
        logsViewBoard.innerHTML = "";
        
        snapshot.forEach((doc) => {
          const item = doc.data();
          
          // Client-side channel filtering bypasses strict Firestore index structural rules
          if (item.channelId !== currentChannelId) return;

          const timestampLabel = item.createdAt ? new Date(item.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
          
          const rowBox = document.createElement('div');
          rowBox.className = 'message';
          rowBox.innerHTML = `
            <img class="avatar" src="${item.photoURL}" alt="Avatar" onclick="openUserProfileCard('${item.uid}')">
            <div class="message-content">
              <div class="message-header">
                <span class="msg-username" onclick="openUserProfileCard('${item.uid}')">${item.username}</span>
                <span class="msg-time">${timestampLabel}</span>
              </div>
              <div class="msg-text">${parseRenderBodyEmbeds(item.text)}</div>
            </div>
          `;
          logsViewBoard.appendChild(rowBox);
        });
        logsViewBoard.scrollTop = logsViewBoard.scrollHeight;
      });
    }

    // --- EMIT MEDIA EMBED INTERPRETER ---
    function parseRenderBodyEmbeds(plainText) {
      let sanitized = plainText.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      const urlPattern = /(https?:\/\/[^\s]+)/gi;

      return sanitized.replace(urlPattern, (matchedUrl) => {
        if (matchedUrl.match(/\.(jpeg|jpg|gif|png|webp)/i) || matchedUrl.includes("giphy.com/media") || matchedUrl.includes("tenor.com/view")) {
          return `${matchedUrl}<br><img src="${matchedUrl}" class="embed-gif" onerror="this.style.display='none'" />`;
        }
        return `<a href="${matchedUrl}" target="_blank" style="color: var(--blurple); text-decoration: none;">${matchedUrl}</a>`;
      });
    }
  </script>
